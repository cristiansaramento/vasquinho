<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatos da sua vida</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Fredoka', Arial, sans-serif;
    background: #f0f6ff;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #4a90e2;
    color: #fff;
    border: none;
    cursor: pointer;
}

.card {
    background: #f9f9f9;
    margin-top: 15px;
    padding: 15px;
    border-radius: 8px;
}

.event {
    margin-top: 10px;
    padding: 10px;
    background: #eef3ff;
    border-radius: 6px;
    cursor: pointer;
}

.event-details {
    display: none;
    margin-top: 8px;
}

.event img {
    width: 100%;
    border-radius: 6px;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Seus dados + história do mundo</h1>

    <input id="nome" placeholder="Nome">
    <input id="sobrenome" placeholder="Sobrenome">
    <input id="data" placeholder="DD/MM/AAAA" maxlength="10">
    <input id="altura" placeholder="Altura (cm)">
    <input id="peso" placeholder="Peso (kg)">
    <button onclick="gerar()">Gerar</button>

    <div id="resultado"></div>
</div>

<script>
// base simples real (exemplos históricos reais)
const eventos = {
    "27/04": [
        {
            ano: 1828,
            texto: "Inauguração do Zoológico de Londres.",
            img: "https://upload.wikimedia.org/wikipedia/commons/3/3e/London_Zoo_entrance.jpg",
            link: "https://pt.wikipedia.org/wiki/Jardim_Zool%C3%B3gico_de_Londres"
        },
        {
            ano: 1994,
            texto: "África do Sul realiza sua primeira eleição multirracial.",
            img: "https://upload.wikimedia.org/wikipedia/commons/5/5f/South_Africa_election_1994.jpg",
            link: "https://pt.wikipedia.org/wiki/Elei%C3%A7%C3%B5es_gerais_na_%C3%81frica_do_Sul_em_1994"
        }
    ],
    "11/09": [
        {
            ano: 2001,
            texto: "Ataques às Torres Gêmeas em Nova York.",
            img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/WTC_smoking_on_9-11.jpeg",
            link: "https://pt.wikipedia.org/wiki/Atentados_de_11_de_setembro_de_2001"
        }
    ]
};

// máscara
document.getElementById("data").addEventListener("input", function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
    this.value = v;
});

// cálculo idade
function calcularIdade(data) {
    const hoje = new Date();
    let anos = hoje.getFullYear() - data.getFullYear();
    let meses = hoje.getMonth() - data.getMonth();
    let dias = hoje.getDate() - data.getDate();

    if (dias < 0) {
        meses--;
        dias += 30;
    }
    if (meses < 0) {
        anos--;
        meses += 12;
    }

    return {anos, meses, dias};
}

function gerar() {
    const nome = document.getElementById("nome").value;
    const sobrenome = document.getElementById("sobrenome").value;
    const dataStr = document.getElementById("data").value;
    const altura = Number(document.getElementById("altura").value);
    const peso = Number(document.getElementById("peso").value);

    if (!nome || !sobrenome || !altura || !peso || dataStr.length !== 10) {
        alert("Preencha corretamente");
        return;
    }

    const [d,m,a] = dataStr.split("/").map(Number);
    const nascimento = new Date(a, m-1, d);

    if (isNaN(nascimento)) {
        alert("Data inválida");
        return;
    }

    const idade = calcularIdade(nascimento);

    const imc = peso / ((altura/100)*(altura/100));
    let classif = "";
    if (imc < 18.5) classif = "baixo peso";
    else if (imc < 25) classif = "normal";
    else if (imc < 30) classif = "sobrepeso";
    else classif = "obesidade";

    const diasVida = Math.floor((new Date() - nascimento) / (1000*60*60*24));

    const chave = dataStr.slice(0,5);

    let html = `
    <div class="card">
        <h3>${nome} ${sobrenome}</h3>
        <p>Idade: ${idade.anos} anos, ${idade.meses} meses, ${idade.dias} dias</p>
        <p>Dias de vida: ${diasVida}</p>
        <p>IMC: ${imc.toFixed(1)} (${classif})</p>
    </div>

    <div class="card">
        <h3>o que aconteceu no mundo nos seus aniversários</h3>
    `;

    if (eventos[chave]) {
        for (let i = 5; i <= idade.anos; i += 5) {
            html += `<div class="event" onclick="toggle(this)">
                <strong>Quando você fez ${i} anos</strong>
                <div class="event-details">`;

            eventos[chave].forEach(e => {
                html += `
                <p>${e.ano} - ${e.texto}</p>
                <img src="${e.img}">
                <a href="${e.link}" target="_blank">Ver mais</a>
                `;
            });

            html += `</div></div>`;
        }
    } else {
        html += "<p>Não há eventos cadastrados para essa data.</p>";
    }

    html += "</div>";

    document.getElementById("resultado").innerHTML = html;
}

function toggle(el) {
    const d = el.querySelector(".event-details");
    d.style.display = d.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
